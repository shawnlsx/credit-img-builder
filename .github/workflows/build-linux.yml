name: Build Linux Executable

on:
  # 手动触发
  workflow_dispatch:
  # 推送时自动触发
  push:
    paths:
      - 'extract_enterprise_credit_images.py'
      - '.github/workflows/build-linux.yml'

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 在 Debian Buster 容器中构建（glibc 2.28）
        run: |
          docker run --rm -v "$PWD":/work -w /work \
            python:3.9-slim-buster bash -c '
              set -ex
              echo "=== glibc 版本 ==="
              ldd --version | head -1
              echo "=== Python 版本 ==="
              python3 --version
              echo "=== 安装 PyInstaller ==="
              pip install pyinstaller==6.10.0
              echo "=== 构建 ==="
              pyinstaller --onefile --clean \
                --name extract_credit_images \
                extract_enterprise_credit_images.py
              echo "=== 验证 ==="
              file dist/extract_credit_images
              ldd dist/extract_credit_images || true
            '

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: extract_credit_images-linux
          path: dist/extract_credit_images
          if-no-files-found: error
